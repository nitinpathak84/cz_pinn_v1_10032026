defaults:
  - physicsnemo_default
  - arch:
      - fully_connected
  - optimizer: adam
  - scheduler: exponential_lr
  - loss: sum
  - batch_size: cz_v1
  - custom: cz_v1

jit: true
save_filetypes: ["vtk", "np"]
debug: false

training:
  max_steps: 30000
  rec_results_freq: 500
  rec_constraint_freq: 500
  rec_inference_freq: 1000